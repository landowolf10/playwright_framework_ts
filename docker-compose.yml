version: "3.9"

services:
  playwright:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playwright-tests
    environment:
      BASE_URL: ${BASE_URL:-https://www.saucedemo.com}
      TEST_FILE: ${TEST_FILE:-}
      CI: "true"
    volumes:
      - ./src:/app/src
      - ./playwright.config.ts:/app/playwright.config.ts
      - ./reports:/app/reports
      - ./test-results:/app/test-results
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
    working_dir: /app
    command: >
      sh -c "npx playwright install --with-deps && npx playwright test $TEST_FILE"
    networks:
      - monitoring

  playwright-report:
    image: mcr.microsoft.com/playwright:v1.41.2-focal
    container_name: playwright-report
    working_dir: /app
    volumes:
      - ./reports:/app/reports
    ports:
      - "8080:8080"
    command: >
      sh -c "npx playwright show-report ./reports/html --port 8080"
    networks:
      - monitoring

  metrics:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playwright-metrics
    command: sh -c "npm run build && node dist/helpers/observability/server.js"
    ports:
      - "9100:9100"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - metrics
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
